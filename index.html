<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bookshelf - your silent sanctuary to organize and cultive readings</title>
    <!-- SEO Optimization Meta Tags -->
    <meta name="description" content="Bookshelf - your silent sanctuary to organize and cultive readings. Organize seus livros físicos ou digitais, configure o progresso (Lendo, Concluído, Pausado, Quer Ler), escreva resenhas detalhadas e guarde suas citações favoritas no diário." />
    <meta name="keywords" content="bookshelf, bookshelf app, your silent sanctuary to organize and cultive readings, diário de leitura, organizador de livros, resenha de livros, citações, diário literário, minhas leituras, gerenciar livros" />
    <meta name="author" content="Bookshelf Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bookshelf - Your Silent Sanctuary to Organize and Cultive Readings" />
    <meta property="og:description" content="Seu diário e organizador de leituras pessoal. Armazene citações brilhantes, avalie livros com notas, gerencie status e filtre sua biblioteca particular." />
    
    <!-- Cross-Browser Theme & Web App Meta Tags -->
    <meta name="theme-color" content="#171219" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bookshelf" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="msapplication-TileColor" content="#171219" />
